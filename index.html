const LS='aevo_v2_stats';
const LS_SESSION='aevo_v22_session';
const HF={1:['HF1','Ausbildung planen','📋','#0C447C','#E6F1FB'],2:['HF2','Vorbereiten','🛠️','#085041','#E1F5EE'],3:['HF3','Durchführen','🎓','#8A4A08','#FAEEDA'],4:['HF4','Abschließen','🏁','#72243E','#FBEAF0']};
let state={screen:'home',mode:'mc',hf:0,typ:'Alle',queue:[],idx:0,answered:false,selected:null,exam:false,examStart:null,examLimit:180*60,optOrders:{}};
let stats=JSON.parse(localStorage.getItem(LS)||'{}');
function save(){localStorage.setItem(LS,JSON.stringify(stats));}
function saveSession(){try{if(state.screen==='quiz'&&state.queue.length){localStorage.setItem(LS_SESSION,JSON.stringify({mode:state.mode,hf:state.hf,typ:state.typ,idx:state.idx,answered:state.answered,selected:state.selected,queueIds:state.queue.map(q=>q.id),optOrders:state.optOrders,ts:Date.now()}));}}catch(e){}}
function clearSession(){localStorage.removeItem(LS_SESSION);}
function loadSession(){try{let raw=localStorage.getItem(LS_SESSION);if(!raw)return null;let x=JSON.parse(raw);let map=Object.fromEntries(QUESTIONS.map(q=>[q.id,q]));x.queue=(x.queueIds||[]).map(id=>map[id]).filter(Boolean);if(!x.queue.length)return null;return x;}catch(e){return null;}}
function resumeSession(){let x=loadSession();if(!x)return;state.mode=x.mode||'mc';state.hf=x.hf||0;state.typ=x.typ||'Alle';state.idx=Math.min(x.idx||0,x.queue.length-1);state.answered=!!x.answered;state.selected=x.selected;state.queue=x.queue;state.optOrders=x.optOrders||{};state.screen='quiz';render();}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeOrder(q){return shuffle(q.antworten.map((_,i)=>i));}
function prepareOrders(){state.optOrders={};state.queue.forEach(q=>{state.optOrders[q.id]=makeOrder(q);});}
function pool(){return QUESTIONS.filter(q=>(!state.hf||q.hf===state.hf)&&(state.typ==='Alle'||q.typ===state.typ));}
function getStat(id){return stats[id]||{r:0,f:0,last:null}}
function pctForHF(h){let ps=QUESTIONS.filter(q=>q.hf===h);let done=ps.filter(q=>getStat(q.id).r>0).length;return ps.length?Math.round(done/ps.length*100):0}
function start(mode, hf=0, typ='Alle'){state.mode=mode;state.hf=hf;state.typ=typ;state.idx=0;state.answered=false;state.selected=null;state.exam=mode==='exam';state.examStart=Date.now();let p=pool(); if(mode==='para') p=QUESTIONS.filter(q=>(!hf||q.hf===hf)&&(q.typ==='Paragraph'||q.thema.includes('Paragraph')||q.gesetz)); if(mode==='mistakes') p=QUESTIONS.filter(q=>(!hf||q.hf===hf)&&getStat(q.id).f>getStat(q.id).r); if(mode==='exam') p=shuffle(QUESTIONS).slice(0,Math.min(80,QUESTIONS.length)); state.queue=shuffle(p); prepareOrders(); state.screen='quiz'; saveSession(); render();}
function badge(q){let h=HF[q.hf]; return `<span class="badge" style="background:${h[4]};color:${h[3]}">${h[2]} ${h[0]}</span><span class="badge" style="background:#eee;color:#444">${q.typ}</span>`;}
function renderHome(){document.getElementById('subtitle').textContent='Multiple Choice · Paragraphentrainer · Prüfung';
let sess=loadSession();let resume=sess?`<div class="card" style="margin-bottom:12px;border:2px solid #0C447C"><div class="h">▶️ Weiterlernen</div><div class="p">Letzte Sitzung: ${sess.mode==='para'?'§§':sess.mode==='mistakes'?'Fehlertraining':sess.mode==='exam'?'Prüfung':'Multiple Choice'} · ${sess.hf?HF[sess.hf][0]:'Alle HF'} · Frage ${Math.min((sess.idx||0)+1,sess.queue.length)} von ${sess.queue.length}</div><button class="btn" onclick="resumeSession()">Dort weitermachen</button><button class="btn light" onclick="clearSession();renderHome()">Letzte Sitzung löschen</button></div>`:'';
let paraCount=QUESTIONS.filter(q=>q.typ==='Paragraph'||q.gesetz).length;let mistakeCount=QUESTIONS.filter(q=>getStat(q.id).f>getStat(q.id).r).length;
app.innerHTML=`<div class="wrap">${resume}<div class="grid">
<div class="tile" onclick="start('mc')"><div class="ico">📝</div><div class="h">Multiple Choice</div><div class="p">${QUESTIONS.length} Fragen mit Erklärung.</div></div>
<div class="tile" onclick="start('para')"><div class="ico">⚖️</div><div class="h">Paragraphen</div><div class="p">${paraCount} Fragen zur Gesetzbuch-Orientierung.</div></div>
<div class="tile" onclick="start('exam')"><div class="ico">⏱️</div><div class="h">Prüfung</div><div class="p">Zufallsfragen mit Ergebnis.</div></div>
<div class="tile" onclick="start('mistakes')"><div class="ico">❌</div><div class="h">Fehlertraining</div><div class="p">${mistakeCount} offene Fehlerfragen.</div></div>
<div class="tile" onclick="renderLaws()"><div class="ico">🧭</div><div class="h">Gesetzesnavigator</div><div class="p">BBiG, JArbSchG, ArbZG, BUrlG, MuSchG, BEEG, BetrVG.</div></div>
<div class="tile" onclick="renderStats()"><div class="ico">📊</div><div class="h">Statistik</div><div class="p">Fortschritt je Handlungsfeld.</div></div>
</div><div class="card" style="margin-top:12px"><div class="h">🎨 Farblogik</div><div class="p">HF1 blau · HF2 grün · HF3 orange · HF4 rot/violett. Diese Struktur bleibt in der ganzen App gleich.</div></div></div>`;}
function renderFilters(){return `<div class="tabs"><button class="tab" onclick="state.screen='home';render()">🏠 Start</button><button class="tab ${state.mode==='mc'?'active':''}" onclick="start('mc',state.hf,state.typ)">📝 MC</button><button class="tab ${state.mode==='para'?'active':''}" onclick="start('para',state.hf)">⚖️ §§</button><button class="tab ${state.mode==='exam'?'active':''}" onclick="start('exam')">⏱ Prüfung</button><button class="tab ${state.mode==='mistakes'?'active':''}" onclick="start('mistakes',state.hf)">❌ Fehler</button></div><div class="chips">${[0,1,2,3,4].map(h=>`<button class="chip ${state.hf===h?'active':''}" onclick="start(state.mode,${h},state.typ)">${h?HF[h][2]+' '+HF[h][0]:'Alle HF'}</button>`).join('')}${['Alle','Wissen','Verständnis','Situation','Paragraph'].map(t=>`<button class="chip ${state.typ===t?'active':''}" onclick="start('mc',state.hf,'${t}')">${t}</button>`).join('')}</div>`}

function optionMeaning(txt){
  const law={
    '§ 1 BBiG':'Ziele und Begriffe der Berufsbildung','§ 2 BBiG':'Lernorte der Berufsbildung','§ 4 BBiG':'Anerkennung von Ausbildungsberufen','§ 5 BBiG':'Ausbildungsordnung und Ausbildungsrahmenplan','§ 7 BBiG':'Anrechnung beruflicher Vorbildung','§ 7a BBiG':'Teilzeitberufsausbildung','§ 8 BBiG':'Abkürzung oder Verlängerung der Ausbildungsdauer','§ 9 BBiG':'Regelungsbefugnis der zuständigen Stelle','§ 10 BBiG':'Berufsausbildungsvertrag','§ 11 BBiG':'Vertragsniederschrift','§ 12 BBiG':'Nichtige Vereinbarungen','§ 13 BBiG':'Pflichten des Auszubildenden','§ 14 BBiG':'Pflichten des Ausbildenden','§ 15 BBiG':'Freistellung','§ 16 BBiG':'Ausbildungszeugnis','§ 17 BBiG':'Ausbildungsvergütung','§ 20 BBiG':'Probezeit','§ 21 BBiG':'Beendigung des Ausbildungsverhältnisses','§ 22 BBiG':'Kündigung','§ 23 BBiG':'Schadensersatz bei vorzeitiger Beendigung','§ 24 BBiG':'Weiterarbeit nach Ausbildungsende','§ 27 BBiG':'Eignung der Ausbildungsstätte','§ 28 BBiG':'Eignung von Ausbildenden und Ausbildern','§ 29 BBiG':'Persönliche Eignung','§ 30 BBiG':'Fachliche Eignung','§ 34 BBiG':'Verzeichnis der Berufsausbildungsverhältnisse','§ 43 BBiG':'Zulassung zur Abschlussprüfung','§ 44 BBiG':'Gestreckte Abschlussprüfung','§ 45 BBiG':'Zulassung in besonderen Fällen','§ 48 BBiG':'Zwischenprüfung','§ 71 BBiG':'Zuständige Stellen','§ 76 BBiG':'Überwachung und Beratung',
    '§ 8 JArbSchG':'Arbeitszeit Jugendlicher','§ 11 JArbSchG':'Ruhepausen Jugendlicher','§ 14 JArbSchG':'Nachtruhe Jugendlicher','§ 19 JArbSchG':'Urlaub Jugendlicher','§ 32 JArbSchG':'Erstuntersuchung','§ 33 JArbSchG':'Nachuntersuchung','§ 44 JArbSchG':'Kosten der Untersuchungen',
    '§ 3 ArbZG':'werktägliche Arbeitszeit','§ 4 ArbZG':'Ruhepausen','§ 5 ArbZG':'Ruhezeit','§ 9 ArbZG':'Sonn- und Feiertagsruhe',
    '§ 3 BUrlG':'Mindesturlaub','§ 4 BUrlG':'Wartezeit','§ 5 BUrlG':'Teilurlaub','§ 7 BUrlG':'Zeitpunkt, Übertragbarkeit und Abgeltung des Urlaubs',
    '§ 17 MuSchG':'Kündigungsverbot im Mutterschutz','§ 18 BEEG':'Kündigungsschutz in Elternzeit','§ 60 BetrVG':'Jugend- und Auszubildendenvertretung','§ 78a BetrVG':'Übernahme von JAV-Mitgliedern','§ 94 BetrVG':'Beurteilungsgrundsätze','§ 99 BetrVG':'Mitbestimmung bei Einstellungen','§ 75 SGB III':'Assistierte Ausbildung','§ 168 SGB IX':'Kündigungsschutz schwerbehinderter Menschen','§ 109 GewO':'Arbeitszeugnis','§ 111 ArbGG':'Schlichtung bei Ausbildungsstreitigkeiten'};
  if(law[txt]) return law[txt];
  if(txt.includes('quantitativ')) return 'Menge/Anzahl des Personalbedarfs';
  if(txt.includes('qualitativ')) return 'Art der benötigten Qualifikationen und Kompetenzen';
  if(txt.includes('intrins')) return 'Motivation aus eigenem Interesse';
  if(txt.includes('extrins')) return 'Motivation durch äußere Anreize';
  if(txt.includes('kognitiv')) return 'Wissen, Denken und Verstehen';
  if(txt.includes('affektiv')) return 'Einstellung, Haltung und Werte';
  if(txt.includes('psychomotor')) return 'praktische Fertigkeiten und Bewegung';
  return 'Diese Option ist hier nicht die passende Lösung.';
}
function answerCompass(q,order){
  let rows=order.map((orig,i)=>{let letter=String.fromCharCode(65+i);let label=q.antworten[orig];let info=(q.optionenInfo&&q.optionenInfo[orig])?q.optionenInfo[orig]:optionMeaning(label);let isR=orig===q.richtig;return `<div class="compare-row ${isR?'r':''}"><span class="compare-letter">${letter})</span><b>${label}</b> = ${info}${isR?' ✅':''}</div>`}).join('');
  return `<div class="compare"><div class="compare-title">🧭 Antwort-Kompass</div>${rows}</div>`;
}
function renderQuiz(){saveSession(); let q=state.queue[state.idx]; if(!q) return renderDone(); document.getElementById('subtitle').textContent=`${state.mode==='para'?'Paragraphentrainer':state.mode==='exam'?'Prüfung':'Multiple Choice'} · Frage ${state.idx+1}/${state.queue.length}`; let h=HF[q.hf]; let order=state.optOrders[q.id]||makeOrder(q); state.optOrders[q.id]=order; let opts=order.map((orig,i)=>{let o=q.antworten[orig]; let cls=''; if(state.answered){ if(orig===q.richtig) cls='ok'; else if(i===state.selected) cls='bad'; } return `<button class="opt ${cls}" onclick="answer(${i})" ${state.answered?'disabled':''}>${String.fromCharCode(65+i)}) ${o}</button>`}).join('');
let exp=''; if(state.answered){let order=state.optOrders[q.id]||makeOrder(q); let ok=order[state.selected]===q.richtig; exp=`<div class="explain show ${ok?'ok':'bad'}"><b>${ok?'✅ Richtig':'❌ Falsch'}</b><br>${q.erklaerung}</div>${answerCompass(q,order)}<button class="btn" onclick="next()">Nächste Frage →</button>`}
app.innerHTML=renderFilters()+`<div class="wrap"><div class="card"><div class="qmeta">${badge(q)}</div><div class="frage">${q.frage}</div>${opts}${exp}</div></div>`;}
function answer(i){if(state.answered)return; let q=state.queue[state.idx]; let order=state.optOrders[q.id]||makeOrder(q); state.optOrders[q.id]=order; state.selected=i; state.answered=true; let s=getStat(q.id); if(order[i]===q.richtig)s.r++; else s.f++; s.last=Date.now(); stats[q.id]=s; save(); saveSession(); render();}
function next(){state.idx++;state.answered=false;state.selected=null;saveSession();render();}
function renderDone(){clearSession(); let qs=state.queue; let r=qs.filter(q=>getStat(q.id).r>0 && getStat(q.id).last).length; document.getElementById('subtitle').textContent='Runde abgeschlossen'; app.innerHTML=`<div class="wrap"><div class="card" style="text-align:center"><div class="ico">🏁</div><div class="h">Runde beendet</div><div class="p">Bearbeitet: ${qs.length} Fragen</div><button class="btn" onclick="start(state.mode,state.hf,state.typ)">Neue Runde starten</button><button class="btn light" onclick="renderHome()">Zur Startseite</button></div></div>`;}
function renderStats(){document.getElementById('subtitle').textContent='Statistik'; let rows=[1,2,3,4].map(h=>{let p=pctForHF(h),H=HF[h];return `<div class="statsrow"><b>${H[2]} ${H[0]} ${H[1]}</b><span>${p}%</span></div><div class="bar"><div class="fill" style="width:${p}%;background:${H[3]}"></div></div>`}).join(''); app.innerHTML=`<div class="tabs"><button class="tab" onclick="renderHome()">🏠 Start</button></div><div class="wrap"><div class="card"><div class="h">📊 Lernfortschritt</div>${rows}<button class="btn light" onclick="if(confirm('Statistik wirklich löschen?')){stats={};save();renderStats();}">Statistik löschen</button></div></div>`;}
function renderLaws(){document.getElementById('subtitle').textContent='Gesetzesnavigator'; const laws=[["§ 1 BBiG", "Ziele und Begriffe der Berufsbildung"],["§ 2 BBiG", "Lernorte der Berufsbildung"],["§ 4 BBiG", "Anerkennung Ausbildungsberufe"],["§ 5 BBiG", "Ausbildungsordnung"],["§ 9 BBiG", "Regelungsbefugnis zuständige Stelle"],["§ 10 BBiG", "Berufsausbildungsvertrag"],["§ 11 BBiG", "Vertragsniederschrift"],["§ 12 BBiG", "Nichtige Vereinbarungen"],["§ 13 BBiG", "Pflichten Auszubildender"],["§ 14 BBiG", "Pflichten Ausbildender"],["§ 15 BBiG", "Freistellung"],["§ 16 BBiG", "Zeugnis"],["§ 17 BBiG", "Vergütung"],["§ 20 BBiG", "Probezeit"],["§ 22 BBiG", "Kündigung"],["§ 24 BBiG", "Weiterarbeit nach Ausbildungsende"],["§ 27 BBiG", "Eignung Ausbildungsstätte"],["§§ 28–30 BBiG", "Eignung Ausbildender/Ausbilder"],["§ 43 BBiG", "Zulassung Abschlussprüfung"],["§ 44 BBiG", "Gestreckte Abschlussprüfung"],["§ 45 BBiG", "Zulassung in besonderen Fällen"],["§ 48 BBiG", "Zwischenprüfung"],["§§ 58–59 BBiG", "Umschulung"],["§ 8 JArbSchG", "Arbeitszeit Jugendliche"],["§ 11 JArbSchG", "Pausen Jugendliche"],["§ 14 JArbSchG", "Nachtruhe"],["§ 19 JArbSchG", "Urlaub Jugendliche"],["§ 32 JArbSchG", "Erstuntersuchung"],["§ 33 JArbSchG", "Nachuntersuchung"],["§ 44 JArbSchG", "Kosten Untersuchungen"],["§ 3 ArbZG", "Werktägliche Arbeitszeit"],["§ 4 ArbZG", "Ruhepausen"],["§ 5 ArbZG", "Ruhezeit"],["§ 9 ArbZG", "Sonn- und Feiertagsruhe"],["§ 3 BUrlG", "Mindesturlaub"],["§ 4 BUrlG", "Wartezeit"],["§ 5 BUrlG", "Teilurlaub"],["§ 7 BUrlG", "Zeitpunkt/Übertragbarkeit/Abgeltung"],["§ 17 MuSchG", "Kündigungsverbot"],["§ 18 BEEG", "Kündigungsschutz Elternzeit"],["§ 60 BetrVG", "JAV"],["§ 78a BetrVG", "Übernahme JAV"],["§ 94 BetrVG", "Beurteilungsgrundsätze"],["§ 99 BetrVG", "Mitbestimmung Einstellung"],["§ 75 SGB III", "Assistierte Ausbildung"],["§ 168 SGB IX", "Kündigung schwerbehinderter Menschen"],["§ 109 GewO", "Arbeitszeugnis"],["§ 111 ArbGG", "Schlichtung"]]; app.innerHTML=`<div class="tabs"><button class="tab" onclick="renderHome()">🏠 Start</button><button class="tab" onclick="start('para')">⚖️ Trainer starten</button></div><div class="wrap"><div class="card"><div class="h">🧭 Gesetzesnavigator</div>${laws.map(l=>`<div class="lawrow"><b>${l[0]}</b><span class="small">${l[1]}</span></div>`).join('')}</div></div>`;}
function render(){if(state.screen==='home')renderHome(); else renderQuiz();}
const app=document.getElementById('app'); renderHome();
</script>
</body>
</html>
