: "Welche Angabe gehört zwingend in eine Ausbildungsordnung?", "antworten": ["Ausbildungsdauer", "Name des Ausbilders", "Betriebsratsgröße", "Urlaubsplan"], "richtig": 0, "erklaerung": "Ausbildungsordnungen enthalten u. a. Berufsbezeichnung, Ausbildungsdauer, Berufsbild, Rahmenplan und Prüfungsanforderungen."}, {"id": "HF1_052", "hf": 1, "thema": "Ausbildungsordnung", "typ": "Wissen", "gesetz": "§ 5 BBiG", "frage": "Was ist der Ausbildungsrahmenplan?", "antworten": ["Teil der Ausbildungsordnung", "Teil des Arbeitsvertrags", "Protokoll der Kammer", "Berufsschulzeugnis"], "richtig": 0, "erklaerung": "Der Ausbildungsrahmenplan ist Teil der Ausbildungsordnung und beschreibt die sachliche und zeitliche Gliederung."}, {"id": "HF1_053", "hf": 1, "thema": "Eignung Betrieb", "typ": "Situation", "gesetz": "§ 27 BBiG", "frage": "Ein Betrieb kann nicht alle Ausbildungsinhalte selbst vermitteln. Was ist eine sinnvolle Lösung?", "antworten": ["Verbundausbildung", "Ausbildung ohne Rahmenplan", "Kürzung der Prüfung", "Keine Berufsschule"], "richtig": 0, "erklaerung": "Bei fehlenden Inhalten kann eine Verbundausbildung oder Ausbildung außerhalb der Stätte helfen."}, {"id": "HF1_054", "hf": 1, "thema": "Eignung Ausbilder", "typ": "Wissen", "gesetz": "§§ 28-30 BBiG", "frage": "Welche zwei Eignungen braucht ein Ausbilder grundsätzlich?", "antworten": ["Persönlich und fachlich", "Finanziell und räumlich", "Schriftlich und mündlich", "Technisch und digital"], "richtig": 0, "erklaerung": "Ausbilder müssen persönlich und fachlich geeignet sein."}, {"id": "HF1_055", "hf": 1, "thema": "Fehlerfallen", "typ": "Paragraph", "gesetz": "§ 10 BBiG", "frage": "Welche Zuordnung ist richtig?", "antworten": ["§ 10 BBiG = Definition des Ausbildenden", "§ 10 BBiG = Berufsausbildungsvertrag", "§ 10 BBiG = Probezeit", "§ 10 BBiG = Zeugnis"], "richtig": 1, "erklaerung": "Wichtige Fehlerfalle: § 10 BBiG regelt den Berufsausbildungsvertrag, nicht nur die Definition des Ausbildenden."}, {"id": "HF1_056", "hf": 1, "thema": "Fehlerfallen", "typ": "Paragraph", "gesetz": "§ 20 BBiG", "frage": "Welche Zuordnung ist richtig?", "antworten": ["§ 20 BBiG = Kündigung", "§ 20 BBiG = Probezeit", "§ 20 BBiG = Zeugnis", "§ 20 BBiG = Vergütung"], "richtig": 1, "erklaerung": "§ 20 BBiG regelt die Probezeit; Kündigung steht in § 22 BBiG."}, {"id": "HF1_057", "hf": 1, "thema": "Fehlerfallen", "typ": "Paragraph", "gesetz": "§ 22 BBiG", "frage": "Welche Zuordnung ist richtig?", "antworten": ["§ 22 BBiG = Probezeit", "§ 22 BBiG = Kündigung", "§ 22 BBiG = Ausbildungsordnung", "§ 22 BBiG = Eignung"], "richtig": 1, "erklaerung": "§ 22 BBiG regelt die Kündigung."}, {"id": "HF1_058", "hf": 1, "thema": "Prüfungslogik", "typ": "Situation", "gesetz": "§ 14 BBiG", "frage": "Ein Azubi soll überwiegend ausbildungsfremde Tätigkeiten erledigen. Welcher Paragraph ist besonders einschlägig?", "antworten": ["§ 14 BBiG", "§ 20 BBiG", "§ 22 BBiG", "§ 43 BBiG"], "richtig": 0, "erklaerung": "§ 14 BBiG verpflichtet den Ausbildenden, nur Aufgaben zu übertragen, die dem Ausbildungszweck dienen."}, {"id": "HF1_059", "hf": 1, "thema": "Prüfungslogik", "typ": "Situation", "gesetz": "§ 32 JArbSchG", "frage": "Ein minderjähriger Bewerber legt keine Bescheinigung über die Erstuntersuchung vor. Was ist die Folge?", "antworten": ["Beschäftigungsverbot", "Automatische Probezeitverlängerung", "Kündigung ohne Vertrag", "Kammerprüfung entfällt"], "richtig": 0, "erklaerung": "Ohne Erstuntersuchungsbescheinigung darf ein Jugendlicher nicht beschäftigt werden."}, {"id": "HF1_060", "hf": 1, "thema": "Prüfungslogik", "typ": "Situation", "gesetz": "JArbSchG", "frage": "Ein Betrieb will Jugendliche über 8 Stunden täglich beschäftigen. Welches Gesetz ist zuerst zu prüfen?", "antworten": ["JArbSchG", "HGB", "BUrlG", "SGB IX"], "richtig": 0, "erklaerung": "Bei Jugendlichen ist das Jugendarbeitsschutzgesetz zentral."}, {"id": "HF2_001", "hf": 2, "thema": "Ausbildungsplan", "typ": "Wissen", "gesetz": "§ 14 BBiG", "frage": "Wozu dient der betriebliche Ausbildungsplan?", "antworten": ["Zur planmäßigen Durchführung der Ausbildung", "Zur Berechnung der Gewerbesteuer", "Zur Kündigung des Azubis", "Zur Wahl der Berufsschule"], "richtig": 0, "erklaerung": "Der betriebliche Ausbildungsplan konkretisiert die Ausbildungsordnung für den Betrieb."}, {"id": "HF3_001", "hf": 3, "thema": "Vier-Stufen-Methode", "typ": "Wissen", "gesetz": "", "frage": "Welche Reihenfolge gehört zur Vier-Stufen-Methode?", "antworten": ["Vorbereiten – Vormachen – Nachmachen – Üben", "Üben – Vormachen – Prüfen – Kündigen", "Planen – Bezahlen – Kontrollieren – Zeugnis", "Fragen – Pausieren – Testen – Übernehmen"], "richtig": 0, "erklaerung": "Die Vier-Stufen-Methode ist eine klassische Unterweisungsmethode."}, {"id": "HF4_001", "hf": 4, "thema": "Prüfungen", "typ": "Paragraph", "gesetz": "§ 48 BBiG", "frage": "Was regelt § 48 BBiG?", "antworten": ["Zwischenprüfung", "Probezeit", "Ausbildungsvergütung", "Urlaub"], "richtig": 0, "erklaerung": "§ 48 BBiG regelt die Zwischenprüfung."}];
const LS='aevo_v2_stats';
const HF={1:['HF1','Ausbildung planen','📋','#0C447C','#E6F1FB'],2:['HF2','Vorbereiten','🛠️','#085041','#E1F5EE'],3:['HF3','Durchführen','🎓','#8A4A08','#FAEEDA'],4:['HF4','Abschließen','🏁','#72243E','#FBEAF0']};
let state={screen:'home',mode:'mc',hf:0,typ:'Alle',queue:[],idx:0,answered:false,selected:null,exam:false,examStart:null,examLimit:180*60};
let stats=JSON.parse(localStorage.getItem(LS)||'{}');
function save(){localStorage.setItem(LS,JSON.stringify(stats));}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pool(){return QUESTIONS.filter(q=>(!state.hf||q.hf===state.hf)&&(state.typ==='Alle'||q.typ===state.typ));}
function getStat(id){return stats[id]||{r:0,f:0,last:null}}
function pctForHF(h){let ps=QUESTIONS.filter(q=>q.hf===h);let done=ps.filter(q=>getStat(q.id).r>0).length;return ps.length?Math.round(done/ps.length*100):0}
function start(mode, hf=0, typ='Alle'){state.mode=mode;state.hf=hf;state.typ=typ;state.idx=0;state.answered=false;state.selected=null;state.exam=mode==='exam';state.examStart=Date.now();let p=pool(); if(mode==='para') p=QUESTIONS.filter(q=>(!hf||q.hf===hf)&&(q.typ==='Paragraph'||q.thema.includes('Paragraph')||q.gesetz)); if(mode==='mistakes') p=QUESTIONS.filter(q=>(!hf||q.hf===hf)&&getStat(q.id).f>getStat(q.id).r); if(mode==='exam') p=shuffle(QUESTIONS).slice(0,Math.min(40,QUESTIONS.length)); state.queue=shuffle(p); state.screen='quiz'; render();}
function badge(q){let h=HF[q.hf]; return `<span class="badge" style="background:${h[4]};color:${h[3]}">${h[2]} ${h[0]}</span><span class="badge" style="background:#eee;color:#444">${q.typ}</span>${q.gesetz?`<span class="gesetz">${q.gesetz}</span>`:''}`;}
function renderHome(){document.getElementById('subtitle').textContent='Multiple Choice · Paragraphentrainer · Prüfung';
app.innerHTML=`<div class="wrap"><div class="grid">
<div class="tile" onclick="start('mc')"><div class="ico">📝</div><div class="h">Multiple Choice</div><div class="p">Alle Fragen mit Erklärung.</div></div>
<div class="tile" onclick="start('para')"><div class="ico">⚖️</div><div class="h">Paragraphen</div><div class="p">Gesetzbuch-Orientierung trainieren.</div></div>
<div class="tile" onclick="start('exam')"><div class="ico">⏱️</div><div class="h">Prüfung</div><div class="p">Zufallsfragen mit Ergebnis.</div></div>
<div class="tile" onclick="start('mistakes')"><div class="ico">❌</div><div class="h">Fehlertraining</div><div class="p">Nur falsch beantwortete Fragen.</div></div>
<div class="tile" onclick="renderLaws()"><div class="ico">🧭</div><div class="h">Gesetzesnavigator</div><div class="p">BBiG, JArbSchG, BetrVG.</div></div>
<div class="tile" onclick="renderStats()"><div class="ico">📊</div><div class="h">Statistik</div><div class="p">Fortschritt je Handlungsfeld.</div></div>
</div><div class="card" style="margin-top:12px"><div class="h">🎨 Farblogik</div><div class="p">HF1 blau · HF2 grün · HF3 orange · HF4 rot/violett. Diese Struktur bleibt in der ganzen App gleich.</div></div></div>`;}
function renderFilters(){return `<div class="tabs"><button class="tab" onclick="state.screen='home';render()">🏠 Start</button><button class="tab ${state.mode==='mc'?'active':''}" onclick="start('mc',state.hf,state.typ)">📝 MC</button><button class="tab ${state.mode==='para'?'active':''}" onclick="start('para',state.hf)">⚖️ §§</button><button class="tab ${state.mode==='exam'?'active':''}" onclick="start('exam')">⏱ Prüfung</button><button class="tab ${state.mode==='mistakes'?'active':''}" onclick="start('mistakes',state.hf)">❌ Fehler</button></div><div class="chips">${[0,1,2,3,4].map(h=>`<button class="chip ${state.hf===h?'active':''}" onclick="start(state.mode,${h},state.typ)">${h?HF[h][2]+' '+HF[h][0]:'Alle HF'}</button>`).join('')}${['Alle','Wissen','Verständnis','Situation','Paragraph'].map(t=>`<button class="chip ${state.typ===t?'active':''}" onclick="start('mc',state.hf,'${t}')">${t}</button>`).join('')}</div>`}
function renderQuiz(){let q=state.queue[state.idx]; if(!q) return renderDone(); document.getElementById('subtitle').textContent=`${state.mode==='para'?'Paragraphentrainer':state.mode==='exam'?'Prüfung':'Multiple Choice'} · Frage ${state.idx+1}/${state.queue.length}`; let h=HF[q.hf]; let opts=q.antworten.map((o,i)=>{let cls=''; if(state.answered){ if(i===q.richtig) cls='ok'; else if(i===state.selected) cls='bad'; } return `<button class="opt ${cls}" onclick="answer(${i})" ${state.answered?'disabled':''}>${String.fromCharCode(65+i)}) ${o}</button>`}).join('');
let exp=''; if(state.answered){let ok=state.selected===q.richtig; exp=`<div class="explain show ${ok?'ok':'bad'}"><b>${ok?'✅ Richtig':'❌ Falsch'}</b><br>${q.erklaerung}</div><button class="btn" onclick="next()">Nächste Frage →</button>`}
app.innerHTML=renderFilters()+`<div class="wrap"><div class="card"><div class="qmeta">${badge(q)}</div><div class="frage">${q.frage}</div>${opts}${exp}</div></div>`;}
function answer(i){if(state.answered)return; let q=state.queue[state.idx]; state.selected=i; state.answered=true; let s=getStat(q.id); if(i===q.richtig)s.r++; else s.f++; s.last=Date.now(); stats[q.id]=s; save(); render();}
function next(){state.idx++;state.answered=false;state.selected=null;render();}
function renderDone(){let qs=state.queue; let r=qs.filter(q=>getStat(q.id).r>0 && getStat(q.id).last).length; document.getElementById('subtitle').textContent='Runde abgeschlossen'; app.innerHTML=`<div class="wrap"><div class="card" style="text-align:center"><div class="ico">🏁</div><div class="h">Runde beendet</div><div class="p">Bearbeitet: ${qs.length} Fragen</div><button class="btn" onclick="start(state.mode,state.hf,state.typ)">Neue Runde starten</button><button class="btn light" onclick="renderHome()">Zur Startseite</button></div></div>`;}
function renderStats(){document.getElementById('subtitle').textContent='Statistik'; let rows=[1,2,3,4].map(h=>{let p=pctForHF(h),H=HF[h];return `<div class="statsrow"><b>${H[2]} ${H[0]} ${H[1]}</b><span>${p}%</span></div><div class="bar"><div class="fill" style="width:${p}%;background:${H[3]}"></div></div>`}).join(''); app.innerHTML=`<div class="tabs"><button class="tab" onclick="renderHome()">🏠 Start</button></div><div class="wrap"><div class="card"><div class="h">📊 Lernfortschritt</div>${rows}<button class="btn light" onclick="if(confirm('Statistik wirklich löschen?')){stats={};save();renderStats();}">Statistik löschen</button></div></div>`;}
function renderLaws(){document.getElementById('subtitle').textContent='Gesetzesnavigator'; const laws=[['§ 4 BBiG','Anerkennung Ausbildungsberufe'],['§ 5 BBiG','Ausbildungsordnung'],['§ 10 BBiG','Berufsausbildungsvertrag'],['§ 11 BBiG','Vertragsniederschrift'],['§ 13 BBiG','Pflichten Auszubildender'],['§ 14 BBiG','Pflichten Ausbildender'],['§ 15 BBiG','Freistellung'],['§ 17 BBiG','Vergütung'],['§ 20 BBiG','Probezeit'],['§ 22 BBiG','Kündigung'],['§ 27 BBiG','Eignung Ausbildungsstätte'],['§§ 28–30 BBiG','Eignung Ausbilder'],['§ 48 BBiG','Zwischenprüfung'],['§ 43 BBiG','Zulassung Abschlussprüfung'],['§ 8 JArbSchG','Arbeitszeit Jugendliche'],['§ 11 JArbSchG','Pausen Jugendliche'],['§ 19 JArbSchG','Urlaub Jugendliche'],['§ 99 BetrVG','Mitbestimmung Einstellung']]; app.innerHTML=`<div class="tabs"><button class="tab" onclick="renderHome()">🏠 Start</button><button class="tab" onclick="start('para')">⚖️ Trainer starten</button></div><div class="wrap"><div class="card"><div class="h">🧭 Gesetzesnavigator</div>${laws.map(l=>`<div class="lawrow"><b>${l[0]}</b><span class="small">${l[1]}</span></div>`).join('')}</div></div>`;}
function render(){if(state.screen==='home')renderHome(); else renderQuiz();}
const app=document.getElementById('app'); renderHome();
</script>
