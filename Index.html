<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>AEVO Lern-App</title>
<style>
/* ══ MODUL 2: STYLES ══ */
:root {
  --hf1:#0C447C;--hf1-bg:#E6F1FB;
  --hf2:#085041;--hf2-bg:#E1F5EE;
  --hf3:#633806;--hf3-bg:#FAEEDA;
  --hf4:#72243E;--hf4-bg:#FBEAF0;
  --gruen:#3B6D11;--gruen-bg:#EAF3DE;
  --rot:#A32D2D;--rot-bg:#FCEBEB;
  --grau:#444441;--grau-hell:#F1EFE8;
  --border:rgba(0,0,0,0.12);
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;max-width:430px;margin:0 auto;}
.nav-bar{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:100;}
.nav-title{font-size:17px;font-weight:600;text-align:center;}
.nav-sub{font-size:12px;color:#8e8e93;text-align:center;margin-top:2px;}
.tab-bar{display:flex;gap:6px;padding:10px 16px;background:rgba(255,255,255,0.95);border-bottom:0.5px solid var(--border);}
.tab-btn{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:var(--grau-hell);color:var(--grau);transition:all .2s;}
.tab-btn.active{background:#1c1c1e;color:white;}
.hf-filter{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.hf-filter::-webkit-scrollbar{display:none;}
.hf-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--grau);transition:all .2s;}
.hf-chip.a0{background:#1c1c1e;color:white;border-color:#1c1c1e;}
.hf-chip.a1{background:var(--hf1-bg);color:var(--hf1);border-color:var(--hf1);}
.hf-chip.a2{background:var(--hf2-bg);color:var(--hf2);border-color:var(--hf2);}
.hf-chip.a3{background:var(--hf3-bg);color:var(--hf3);border-color:var(--hf3);}
.hf-chip.a4{background:var(--hf4-bg);color:var(--hf4);border-color:var(--hf4);}
.progress-wrap{padding:8px 16px 2px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:#8e8e93;margin-bottom:5px;}
.progress-bar{height:4px;background:#e5e5ea;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:#34c759;border-radius:2px;transition:width .3s;}
/* Karteikarte */
.card-scene{padding:14px 16px;}
.card-wrap{width:100%;min-height:240px;position:relative;transform-style:preserve-3d;transition:transform .45s ease;cursor:pointer;}
.card-wrap.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;min-height:240px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;box-shadow:var(--shadow);}
.card-front{background:white;}
.card-back{background:#fafafa;transform:rotateY(180deg);}
.card-hf-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;margin-bottom:10px;flex-shrink:0;}
.card-gesetz{font-size:13px;font-weight:600;color:#8e8e93;margin-bottom:8px;flex-shrink:0;}
.card-frage{font-size:15px;font-weight:500;line-height:1.5;flex:1;}
.card-antwort{font-size:14px;line-height:1.55;flex:1;white-space:pre-line;}
.card-tap-hint{font-size:12px;color:#8e8e93;text-align:center;margin-top:12px;flex-shrink:0;}
.card-label{font-size:11px;font-weight:600;color:#8e8e93;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0;}
.rate-wrap{display:flex;gap:8px;padding:0 16px 16px;}
.rate-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s;}
.rate-btn:active{transform:scale(0.96);}
.rate-btn.nein{background:var(--rot-bg);color:var(--rot);}
.rate-btn.ja{background:var(--gruen-bg);color:var(--gruen);}
/* Multiple Choice */
.mc-card{margin:0 16px 12px;background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.mc-hf{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;margin-bottom:10px;}
.mc-frage{font-size:15px;font-weight:500;line-height:1.45;margin-bottom:14px;}
.mc-option{width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:white;cursor:pointer;transition:all .2s;line-height:1.4;display:block;}
.mc-option:last-of-type{margin-bottom:0;}
.mc-option.richtig{border-color:var(--gruen);background:var(--gruen-bg);color:var(--gruen);}
.mc-option.falsch{border-color:var(--rot);background:var(--rot-bg);color:var(--rot);}
.mc-option.neutral{background:var(--grau-hell);border-color:var(--border);color:var(--grau);}
.mc-next{width:100%;padding:14px;margin-top:10px;background:#1c1c1e;color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;}
.mc-result{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-top:10px;display:none;}
.mc-result.show{display:block;}
.mc-result.ok{background:var(--gruen-bg);color:var(--gruen);}
.mc-result.ko{background:var(--rot-bg);color:var(--rot);}
/* Start */
.start-wrap{padding:16px;}
.start-header{font-size:22px;font-weight:700;margin-bottom:4px;}
.start-sub{font-size:14px;color:#8e8e93;margin-bottom:16px;}
.start-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.start-card:active{border-color:#007aff;}
.start-card-icon{font-size:28px;margin-bottom:8px;}
.start-card-title{font-size:17px;font-weight:600;margin-bottom:4px;}
.start-card-sub{font-size:13px;color:#8e8e93;line-height:1.45;}
.start-card-count{font-size:12px;font-weight:600;margin-top:8px;}
/* Stats */
.stats-section{padding:12px 16px;}
.stats-title{font-size:13px;font-weight:600;color:#8e8e93;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-card{background:white;border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.stat-num{font-size:28px;font-weight:700;}
.stat-label{font-size:12px;color:#8e8e93;margin-top:2px;}
.stat-bar{height:3px;border-radius:2px;margin-top:8px;background:#e5e5ea;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;background:#34c759;}
.hf-stat-row{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.hf-stat-name{font-size:13px;font-weight:500;margin-bottom:6px;}
.hf-stat-bar{height:5px;background:#e5e5ea;border-radius:3px;overflow:hidden;}
.hf-stat-fill{height:100%;border-radius:3px;}
.hf-stat-pct{font-size:11px;color:#8e8e93;margin-top:4px;}
/* Done */
.done-wrap{padding:40px 16px;text-align:center;}
.done-emoji{font-size:64px;margin-bottom:16px;}
.done-title{font-size:24px;font-weight:700;margin-bottom:8px;}
.done-sub{font-size:15px;color:#8e8e93;margin-bottom:24px;line-height:1.5;}
.done-btn{display:block;width:100%;padding:15px;background:#1c1c1e;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.done-btn.sec{background:var(--grau-hell);color:var(--grau);}
.back-btn{background:none;border:none;font-size:14px;color:#007aff;cursor:pointer;padding:6px 16px;}
.session-info{font-size:13px;color:#8e8e93;padding:0 16px 8px;}
/* Export/Import */
.sync-wrap{margin:0 0 12px;background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.sync-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.sync-sub{font-size:12px;color:#8e8e93;margin-bottom:12px;line-height:1.4;}
.sync-btn{display:block;width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px;text-align:center;}
.sync-btn.export{background:#E6F1FB;color:#0C447C;}
.sync-btn.import{background:#EAF3DE;color:#3B6D11;}
.sync-btn.reset{background:#FCEBEB;color:#A32D2D;}
.sync-code{width:100%;font-size:11px;font-family:monospace;padding:8px;border:0.5px solid var(--border);border-radius:8px;background:#f9f9f9;resize:none;min-height:60px;margin-bottom:8px;}
.sync-msg{font-size:12px;font-weight:500;padding:6px 10px;border-radius:6px;text-align:center;display:none;}
.sync-msg.ok{background:var(--gruen-bg);color:var(--gruen);display:block;}
.sync-msg.ko{background:var(--rot-bg);color:var(--rot);display:block;}
.sync-section{margin-top:8px;}
.sync-toggle{background:none;border:none;font-size:13px;color:#007aff;cursor:pointer;padding:4px 0;width:100%;text-align:left;}
</style>
</head>
<body>

<div class="nav-bar">
  <div class="nav-title">📚 AEVO Lern-App</div>

<script>
// ══ MODUL 1: DATENBASIS ══
const AEVO_DATA = {
gesetze:[
{id:"g1",hf:1,gesetz:"§ 1 Abs. 3 BBiG",frage:"Was ist das zentrale Ziel der Berufsausbildung laut § 1 Abs. 3 BBiG?",antwort:"Die Vermittlung der beruflichen Handlungsfähigkeit – nicht das Bestehen der Abschlussprüfung. Die bestandene Prüfung ist nur ein Nachweis der fachlichen Qualifikation."},
{id:"g2",hf:1,gesetz:"§ 4 BBiG",frage:"Was regelt § 4 BBiG?",antwort:"Die staatliche Anerkennung von Ausbildungsberufen. Das Bundesministerium für Wirtschaft kann Berufe anerkennen und Ausbildungsordnungen erlassen. In nicht anerkannten Berufen darf nicht ausgebildet werden."},
{id:"g3",hf:1,gesetz:"§ 5 BBiG",frage:"Was muss eine Ausbildungsordnung nach § 5 BBiG zwingend enthalten?",antwort:"1. Berufsbezeichnung\n2. Ausbildungsdauer\n3. Ausbildungsberufsbild\n4. Prüfungsanforderungen\n5. Ausbildungsrahmenplan (sachliche + zeitliche Gliederung)"},
{id:"g4",hf:1,gesetz:"§ 9 BBiG",frage:"Was ist die Regelungsbefugnis nach § 9 BBiG?",antwort:"Das BBiG ermächtigt Bundesministerien, Verordnungen zu erlassen (z. B. Ausbildungsordnungen, AEVO). Kammern können auf dieser Basis Rechtsvorschriften für die Berufsbildung beschließen (§§ 77–79 BBiG)."},
{id:"g5",hf:1,gesetz:"§ 10 Abs. 1 BBiG",frage:"Wer ist der 'Ausbildende' laut § 10 BBiG?",antwort:"Derjenige, der eine andere Person zur Berufsausbildung einstellt. Er ist Vertragspartner des Azubis, muss persönlich geeignet sein (§ 28 BBiG) und kann einen Ausbilder bestellen."},
{id:"g6",hf:1,gesetz:"§§ 14–16 BBiG",frage:"Nennen Sie die Hauptpflichten des Ausbildenden nach §§ 14–16 BBiG.",antwort:"§ 14: Ausbildung planmäßig durchführen, nur ausbildungsbezogene Tätigkeiten übertragen, für Berufsschule und Prüfungen freistellen, Lernmittel kostenlos bereitstellen.\n§ 15: Berichtsheft kontrollieren.\n§ 16: Zeugnis nach Ausbildungsende ausstellen."},
{id:"g7",hf:1,gesetz:"§ 27 BBiG",frage:"Was regelt § 27 BBiG bezüglich der Ausbildungsstätte?",antwort:"Die Ausbildungsstätte muss nach Art und Einrichtung für die Ausbildung geeignet sein. Die Anzahl der Azubis muss in angemessenem Verhältnis zur Fachkräftezahl stehen. Die Kammer überwacht und kann die Eignung entziehen (§ 33 BBiG)."},
{id:"g8",hf:1,gesetz:"§ 28 / § 29 / § 30 BBiG",frage:"Was sind die Voraussetzungen für die Eignung des Ausbilders (§§ 28–30 BBiG)?",antwort:"§ 28: Persönlich UND fachlich geeignet sein (beides gleichzeitig).\n§ 29: Persönlich ungeeignet bei Vorstrafen nach § 25 JArbSchG.\n§ 30: Fachliche Eignung: Berufsabschluss + Berufspraxis + AEVO-Prüfung."},
{id:"g9",hf:1,gesetz:"§ 71 / § 76 BBiG",frage:"Was sind die Aufgaben der zuständigen Stellen (Kammern) nach §§ 71 / 76 BBiG?",antwort:"Kammern (IHK, HWK) überwachen die Ausbildung, führen das Verzeichnis der Ausbildungsverträge, erlassen Prüfungsordnungen, errichten Prüfungsausschüsse und beraten durch Ausbildungsberater (§ 76)."},
{id:"g10",hf:1,gesetz:"§§ 39–41 BBiG",frage:"Was regeln §§ 39–41 BBiG zum Prüfungsausschuss?",antwort:"§ 39: Prüfungsausschuss wird von der zuständigen Stelle errichtet.\n§ 40: Paritätische Zusammensetzung: Arbeitgeber, Arbeitnehmer, Berufsschullehrer.\n§ 41: Beschlussfähigkeit und Abstimmungsregeln."},
{id:"g11",hf:1,gesetz:"§ 2 / § 4 AEVO",frage:"Was regeln § 2 und § 4 AEVO?",antwort:"§ 2 AEVO: Ausbilder muss berufs- und arbeitspädagogische Fertigkeiten, Kenntnisse und Fähigkeiten besitzen.\n§ 4 AEVO: Diese müssen in einer Prüfung nachgewiesen werden.\n§ 7 AEVO: Vor 01.08.2009 tätige Ausbilder sind von der Prüfung befreit."},
{id:"g12",hf:1,gesetz:"Art. 12 GG",frage:"Welches Grundrecht ist für das Ausbildungsverhältnis besonders relevant?",antwort:"Art. 12 Grundgesetz: Das Recht auf Berufsfreiheit – jeder Deutsche hat das Recht, Beruf, Arbeitsplatz und Ausbildungsstätte frei zu wählen."},
{id:"g13",hf:1,gesetz:"AGG",frage:"Was verbietet das AGG im Ausbildungskontext?",antwort:"Diskriminierung wegen Geschlecht, Rasse, ethnischer Herkunft, Religion, Behinderung, Alter oder sexueller Identität – in allen Phasen des Ausbildungsverhältnisses, auch bei Stellenausschreibungen."},
{id:"g14",hf:1,gesetz:"JArbSchG §§ 8 / 11 / 14 / 19",frage:"Nennen Sie die Kernregelungen des JArbSchG für Jugendliche.",antwort:"§ 8: Max. 8 Std./Tag, max. 40 Std./Woche.\n§ 11: Ab 4,5 Std. → 30 Min. Pause; ab 6 Std. → 60 Min. Pause.\n§ 14: Nur 6–20 Uhr; keine Wochenend-/Feiertagsarbeit.\n§ 19: Mindesturlaub: <16 J. = 30, <17 J. = 27, <18 J. = 25 Werktage."},
{id:"g15",hf:1,gesetz:"§ 278 / § 618 / § 831 BGB",frage:"Welche BGB-Paragraphen sind für den Ausbildenden besonders wichtig?",antwort:"§ 618: Schutz des Azubis vor Gesundheitsgefahren.\n§ 278: Ausbildender haftet für Fehler des Ausbilders wie für eigene.\n§ 831: Haftungsminderung möglich durch sorgfältige Ausbilderauswahl (z. B. Führungszeugnis)."},
{id:"g16",hf:1,gesetz:"§ 98 BetrVG / Vorrangprinzip / Günstigkeitsprinzip",frage:"Was besagen Vorrangprinzip und Günstigkeitsprinzip?",antwort:"Vorrangprinzip: Nachfolgende Rechtsquellen dürfen nicht gegen vorrangige verstoßen.\nGünstigkeitsprinzip: Regeln mehrere Quellen dasselbe, gilt stets die für den Azubi günstigste Regelung.\n§ 98 BetrVG: Betriebsrat hat Mitbestimmungsrecht bei Bestellung des Ausbilders."},
{id:"g17",hf:2,gesetz:"§ 14 BBiG (Ausbildungsplan)",frage:"Welche gesetzliche Grundlage verpflichtet zur Erstellung eines Ausbildungsplans?",antwort:"§ 14 BBiG: Ausbildende haben die Berufsausbildung planmäßig, zeitlich und sachlich gegliedert so durchzuführen, dass das Ausbildungsziel in der vorgesehenen Ausbildungszeit erreicht werden kann."},
{id:"g18",hf:2,gesetz:"§ 10 / § 11 / § 12 BBiG",frage:"Was regeln §§ 10–12 BBiG zum Ausbildungsvertrag?",antwort:"§ 10: Schriftlicher Vertrag ist Pflicht; bei Minderjährigen muss gesetzlicher Vertreter zustimmen.\n§ 11: Mindestinhalt: Dauer, Beginn, Stätte, Arbeitszeit, Probezeit, Vergütung, Urlaub, Beendigung.\n§ 12: Nichtige Vereinbarungen: Ausbildungsgebühren, Vertragsstrafen, vorzeitige Arbeitsbindung."},
{id:"g19",hf:2,gesetz:"§ 13 BBiG",frage:"Was sind die Pflichten des Auszubildenden nach § 13 BBiG?",antwort:"An allen Ausbildungsmaßnahmen teilnehmen, Anweisungen befolgen, Betriebsordnung + Geheimnisse wahren, Berichtsheft führen, bei Fernbleiben unverzüglich informieren und Attest vorlegen."},
{id:"g20",hf:2,gesetz:"§ 17 / § 18 BBiG",frage:"Was schreibt § 17 BBiG zur Ausbildungsvergütung vor?",antwort:"Vergütung muss angemessen sein und jährlich steigen. Mindestvergütung seit 2020 (ab 2024 automatisch angepasst). Ohne Tarifbindung: mind. 80 % der tariflichen Vergütung. Sachleistungen max. 75 % – mind. 25 % bar (§ 18: Zahlung am letzten Arbeitstag des Monats)."},
{id:"g21",hf:2,gesetz:"§ 20 / § 22 / § 23 BBiG",frage:"Was regeln §§ 20–23 BBiG zu Probezeit, Kündigung und Schadensersatz?",antwort:"§ 20: Probezeit min. 1 Monat, max. 4 Monate; während Probezeit jederzeit ohne Frist und Grund kündbar.\n§ 22: Nach Probezeit: Ausbildender nur fristlos aus wichtigem Grund (nach mind. 2 Abmahnungen); Azubi mit 4 Wochen Frist.\n§ 23: Schadensersatz bis 3 Monate nach vertragl. Ausbildungsende."},
{id:"g22",hf:2,gesetz:"§§ 34–36 BBiG",frage:"Was regeln §§ 34–36 BBiG zur Eintragung des Vertrags?",antwort:"Pflicht zur unverzüglichen Eintragung bei der zuständigen Kammer nach Vertragsabschluss. Voraussetzungen: rechtmäßiger Vertrag, Eignung Ausbilder + Betrieb, ärztliche Bescheinigung bei Minderjährigen. Ohne Eintragung: keine Prüfungszulassung."},
{id:"g23",hf:2,gesetz:"§ 7 / § 7a / § 8 BBiG",frage:"Wann kann die Ausbildungsdauer verkürzt oder verlängert werden?",antwort:"§ 7: Verkürzung durch Vorbildung (Mittl. Abschluss: –6 Mon., Abitur: –12 Mon.).\n§ 7a: Teilzeitausbildung (20–40 Std./Woche), nur mit Einverständnis des Betriebs.\n§ 8 Abs. 2: Verlängerung auf Antrag des Azubis bei Ausfallzeiten."},
{id:"g24",hf:2,gesetz:"§ 2 BBiG (Lernorte/Ausland)",frage:"Was regelt § 2 BBiG zu Lernorten und Ausland?",antwort:"Lernorte wirken bei der Ausbildung zusammen (Lernortkooperation). Teile der Ausbildung können im Ausland durchgeführt werden – max. 1/4 der Gesamtausbildungszeit. Auslandsaufenthalt muss im Vertrag vermerkt sein."},
{id:"g25",hf:2,gesetz:"§ 60 BetrVG / § 99 BetrVG / § 93 BetrVG",frage:"Welche Mitbestimmungsrechte hat der Betriebsrat in der Ausbildung?",antwort:"§ 60: JAV muss gewählt werden wenn BR besteht + mind. 5 jugendliche AN/Azubis.\n§ 93: BR kann interne Ausschreibung verlangen.\n§ 99: BR muss der Einstellung zustimmen – Frist 1 Woche."},
{id:"g26",hf:2,gesetz:"§§ 32–33 JArbSchG",frage:"Was schreiben §§ 32–33 JArbSchG zu ärztlichen Untersuchungen vor?",antwort:"§ 32: Erstuntersuchung vor Ausbildungsbeginn (max. 14 Monate alt) – Bescheinigung muss dem Betrieb vorliegen. Ohne Bescheinigung: Beschäftigungsverbot.\n§ 33: Nachuntersuchung nach 1 Jahr – Betrieb muss nach 9 Monaten hinweisen. Kosten: Land (§ 44 JArbSchG)."},
{id:"g27",hf:2,gesetz:"AGG + BDSG + DSGVO",frage:"Welche Gesetze gelten für das Auswahlverfahren?",antwort:"AGG: Keine Diskriminierung bei Ausschreibung und Auswahl (Geschlecht, Herkunft, Religion, Behinderung, Alter).\nBDSG + DSGVO: Bewerberdaten vertraulich behandeln, nicht an Dritte weitergeben, nach Ablehnung zurückgeben. Unzulässige Fragen im Gespräch (z. B. Schwangerschaft) verboten."},
{id:"g28",hf:2,gesetz:"MuSchG § 17 / SGB IX § 168",frage:"Welche Sonderkündigungsschutzgruppen gibt es?",antwort:"§ 17 MuSchG: Schwangere – Kündigung unzulässig während Schwangerschaft und bis 4 Monate nach Entbindung. Gilt auch in der Probezeit!\n§ 168 SGB IX: Schwerbehinderte – Kündigung nur mit Zustimmung des Integrationsamtes."},
{id:"g29",hf:3,gesetz:"§ 94 Abs. 2 BetrVG",frage:"Was regelt § 94 Abs. 2 BetrVG im Ausbildungskontext?",antwort:"Der Betriebsrat muss den Bewertungsgrundsätzen für Leistungsbeurteilungen der Azubis zustimmen. Ausbilder darf keine Bewertungsmaßstäbe ohne Zustimmung des Betriebsrats einführen."},
{id:"g30",hf:3,gesetz:"ArbZG / JArbSchG §§ 8 / 11 (Pausen)",frage:"Welche Pausenregelungen gelten für Azubis in der Ausbildung?",antwort:"Volljährige (ArbZG): Ab 6 Std. mind. 30 Min. Pause; ab 9 Std. mind. 45 Min.\nMinderjährige (JArbSchG § 11): Ab 4,5 Std. mind. 30 Min.; ab 6 Std. mind. 60 Min. Pause.\nBeides ist bei der Unterweisungsplanung zu beachten."},
{id:"g31",hf:3,gesetz:"§ 75 SGB III",frage:"Was ist die Assistierte Ausbildung nach § 75 SGB III?",antwort:"Eine begleitende Fördermaßnahme für junge Menschen mit Lernschwierigkeiten während der laufenden Ausbildung. Ziel: Ausbildungsabbrüche verhindern und individuelle Lernbegleitung sichern."},
{id:"g32",hf:4,gesetz:"§ 48 BBiG (Zwischenprüfung)",frage:"Was regelt § 48 BBiG zur Zwischenprüfung?",antwort:"Während der Ausbildung ist eine Zwischenprüfung zur Ermittlung des Ausbildungsstandes durchzuführen. Teilnahme ist Voraussetzung für die Zulassung zur Abschlussprüfung. Ausbildender muss rechtzeitig anmelden."},
{id:"g33",hf:4,gesetz:"§ 43 / § 44 / § 45 BBiG",frage:"Welche Zulassungsvoraussetzungen gelten für die Abschlussprüfung?",antwort:"§ 43: Eintragung im Verzeichnis, Teilnahme Zwischenprüfung, schriftliche Nachweise, Ableistung der Ausbildungszeit.\n§ 44: Gestreckte Abschlussprüfung (Teil 1 + Teil 2) mit eigenen Voraussetzungen.\n§ 45: Vorzeitige Zulassung bei Notendurchschnitt besser als 2,49."},
{id:"g34",hf:4,gesetz:"§ 16 BBiG / § 109 GewO",frage:"Was regeln § 16 BBiG und § 109 GewO zum Ausbildungszeugnis?",antwort:"§ 16 BBiG: Schriftliches Zeugnis ist Pflicht – auch wenn der Azubi ausdrücklich darauf verzichtet. Elektronische Form ausgeschlossen.\n§ 109 GewO: Zeugnis muss klar, verständlich und wohlwollend formuliert sein; keine unterschwelligen negativen Botschaften."},
{id:"g35",hf:4,gesetz:"§ 24 BBiG / § 78a BetrVG",frage:"Was regeln § 24 BBiG und § 78a BetrVG zur Übernahme nach der Ausbildung?",antwort:"§ 24 BBiG: Automatisch unbefristetes Arbeitsverhältnis bei Weiterbeschäftigung ohne neuen Vertrag – auch nur für eine Stunde!\n§ 78a BetrVG: JAV-Mitglieder müssen übernommen werden. Betriebsrat muss zustimmen (§ 99 BetrVG)."},
{id:"g36",hf:4,gesetz:"§§ 58–59 BBiG / ArbGG § 111",frage:"Was regeln §§ 58–59 BBiG zur Umschulung und § 111 ArbGG zu Streitigkeiten?",antwort:"§§ 58–59 BBiG: Umschulungen für andere berufliche Tätigkeit; Prüfungen bei zuständiger Kammer.\n§ 111 ArbGG Abs. 2: Zuständige Stelle kann Schlichtungsausschuss bei Streitigkeiten (Zeugnisse, Vergütung, Vertragsauflösung) einrichten."}
],

konzepte:[
{id:"k1",hf:1,thema:"Vorteile der Ausbildung",frage:"Nennen Sie 3 Vorteile der betrieblichen Ausbildung aus je einer Perspektive: Azubi, Betrieb, Gesellschaft.",antwort:"Azubi: Praxis-Theorie-Verbindung, Vergütung, Übernahmechance.\nBetrieb: Fachkräftesicherung, geringere Einarbeitungskosten, Imagegewinn.\nGesellschaft: Fachkräftenachwuchs, Generationenvertrag, geringere Arbeitslosigkeit."},
{id:"k2",hf:1,thema:"Ausbildungsordnung",frage:"Was ist der Unterschied zwischen Ausbildungsordnung und Ausbildungsrahmenplan?",antwort:"Ausbildungsordnung: Übergeordnetes staatliches Regelwerk (§ 5 BBiG) mit allen Vorgaben für einen Beruf.\nAusbildungsrahmenplan: Ein Teil der Ausbildungsordnung – enthält die Anleitung zur sachlichen und zeitlichen Gliederung der Fertigkeiten und Kenntnisse."},
{id:"k3",hf:1,thema:"Rechtsquellen-Hierarchie",frage:"Nennen Sie die Rechtsquellenhierarchie im Ausbildungsrecht von oben nach unten.",antwort:"1. Grundgesetz (GG)\n2. Gesetze (BBiG, BGB, JArbSchG, AGG...)\n3. Verordnungen (AEVO, Ausbildungsordnungen)\n4. Tarifverträge\n5. Betriebsvereinbarungen\n6. Ausbildungsvertrag\n7. Betriebliche Übung"},
{id:"k4",hf:1,thema:"Stufenausbildung vs. Monoberuf",frage:"Was ist der Unterschied zwischen Monoberuf und Stufenausbildung?",antwort:"Monoberuf: Ein einziger Berufsabschluss nach der gesamten Ausbildungszeit.\nStufenausbildung: Mehrere aufeinander aufbauende Abschlüsse – nach jeder Stufe kann die Ausbildung beendet oder fortgesetzt werden."},
{id:"k5",hf:1,thema:"Verbundausbildung",frage:"Was ist eine Verbundausbildung und wann wird sie eingesetzt?",antwort:"Mehrere Betriebe bilden gemeinsam aus, wenn kein Einzelbetrieb alle Ausbildungsinhalte abdecken kann. Ein Leitbetrieb koordiniert, andere übernehmen fehlende Ausbildungsabschnitte. Alle Betriebe müssen nach § 27 BBiG geeignet sein."},
{id:"k6",hf:1,thema:"Standardberufsbildpositionen",frage:"Was sind die modernisierten Standardberufsbildpositionen (seit 2021)?",antwort:"Verpflichtende Mindestinhalte in allen neuen/modernisierten Ausbildungsberufen:\n1. Digitalisierung der Arbeitswelt\n2. Umweltschutz und Nachhaltigkeit\n3. Organisation des Ausbildungsbetriebs\n4. Sicherheit und Gesundheit\n5. Kommunikation und Kooperation"},
{id:"k7",hf:1,thema:"Personalbedarf",frage:"Was ist der Unterschied zwischen quantitativem und qualitativem Personalbedarf?",antwort:"Quantitativ: Wie viele Arbeitskräfte werden gebraucht? (Kennzahlen: Fluktuation, Altersstruktur, Abbrecherquote)\nQualitativ: Welche Qualifikationen werden gebraucht? (Kennzahlen: Qualifikationsstand, Marktangebot, Unternehmensstrategie)"},
{id:"k8",hf:1,thema:"Anforderungsprofil",frage:"Welche 5 Kategorien umfasst ein Anforderungsprofil für Auszubildende?",antwort:"1. Formale Anforderungen (Schulabschluss, Vorbildung)\n2. Fachliche Kompetenzen (z. B. Fremdsprachen, IT)\n3. Methodenkompetenz (z. B. Rhetorik, Präsentation)\n4. Soft Skills (z. B. Teamfähigkeit)\n5. Persönliche Eigenschaften (z. B. Motivation, Lernbereitschaft)"},
{id:"k9",hf:2,thema:"Planungshierarchie",frage:"Nennen Sie die Planungshierarchie vom § 5 BBiG bis zum individuellen Ausbildungsplan.",antwort:"§ 5 BBiG → Ausbildungsordnung → Ausbildungsrahmenplan → Betrieblicher Ausbildungsplan → Individueller Ausbildungsplan\n\nAus dem betrieblichen Plan ableitbar: Belegungsplan, Versetzungsplan, Checkliste Ausbildungsfortschritt."},
{id:"k10",hf:2,thema:"Zeitrichtwert vs. Zeitrahmen",frage:"Was ist der Unterschied zwischen Zeitrichtwertmethode und Zeitrahmenmethode?",antwort:"Zeitrichtwertmethode: Gewerblich-technische Berufe. Inhalte gebündelt, Richtwerte in Wochen/Tagen/Stunden.\nZeitrahmenmethode: Kaufmännisch-verwaltende Berufe. Sachliche und zeitliche Gliederung getrennt, Zeitangaben in Monaten."},
{id:"k11",hf:2,thema:"Lernorte",frage:"Unterscheiden Sie dezentrale und zentrale Lernorte und nennen Sie je 3 Beispiele.",antwort:"Dezentral (Praxisbezug, am Arbeitsplatz):\n- Ausbildungsecke\n- Lerninsel\n- Juniorenfirma\n\nZentral (losgelöst vom Alltagsgeschäft):\n- Ausbildungswerkstatt/Lehrwerkstatt\n- Lernbüro\n- Unterrichtsraum/Besprechungsraum"},
{id:"k12",hf:2,thema:"Lernformen am Arbeitsplatz",frage:"Was unterscheidet Ausbildungsecke, Lerninsel und Juniorenfirma?",antwort:"Ausbildungsecke: Eigener Platz nahe den Fachkräften; Azubi beobachtet und bereitet Aufgaben vor/nach.\nLerninsel: Identischer Arbeitsplatz ohne Zeitdruck; Arbeit wird vor Produktionseinsatz kontrolliert.\nJuniorenfirma: Eigenverantwortliches Übungsunternehmen mit realem Geschäftsbetrieb."},
{id:"k13",hf:2,thema:"Auswahlverfahren",frage:"Nennen Sie 5 Verfahren zur Auswahl von Auszubildenden (AGG-konform).",antwort:"1. Sichtung Bewerbungsunterlagen\n2. Berufseignungstest\n3. Arbeitsprobe\n4. Kurzpraktikum / Probearbeiten\n5. Assessment-Center\n6. Vorstellungsgespräch\n\nAlle Verfahren müssen AGG-konform sein: keine diskriminierenden Fragen!"},
{id:"k14",hf:2,thema:"Abmahnung",frage:"Welche 4 Bestandteile muss eine rechtsgültige Abmahnung enthalten?",antwort:"1. Konkrete Benennung des beanstandeten Verhaltens (Datum, Ort, Sachverhalt)\n2. Rüge der Pflichtverletzung (welcher Vertragsartikel wurde verletzt?)\n3. Aufforderung zu künftigem vertragsgemäßem Verhalten\n4. Androhung eindeutiger arbeitsrechtlicher Konsequenzen"},
{id:"k15",hf:2,thema:"Interessenvertretungen",frage:"Nennen Sie 4 Interessenvertretungen im Betrieb und ihre Besonderheit.",antwort:"1. Betriebsrat: Ab 5 AN; breite Mitbestimmungsrechte (BetrVG).\n2. JAV: Pflicht wenn BR + mind. 5 jugendliche AN/Azubis (§ 60 BetrVG).\n3. Gleichstellungsbeauftragte: Für Gleichstellung der Geschlechter.\n4. Schwerbehindertenvertretung (SBV): Für Belange schwerbehinderter Beschäftigter."},
{id:"k16",hf:2,thema:"Lernortkooperation",frage:"Was bedeutet Lernortkooperation und was ist didaktische Parallelität?",antwort:"Lernortkooperation (§ 2 BBiG): Betrieb, Berufsschule und überbetriebliche Einrichtungen arbeiten zusammen.\nDidaktische Parallelität: Im Idealfall behandelt die Berufsschule genau dann ein Thema, wenn der Azubi im Betrieb in der entsprechenden Abteilung ist – in der Praxis schwer umzusetzen."},
{id:"k17",hf:3,thema:"Lernzielbereiche",frage:"Nennen Sie die drei Lernzielbereiche mit je einem Beispiel.",antwort:"1. Kognitiv (Wissen): 'Der Azubi kann Qualitätskriterien nennen.'\n2. Affektiv (Einstellung/Haltung): 'Der Azubi zeigt Bereitschaft, Sicherheitsregeln einzuhalten.'\n3. Psychomotorisch (Fertigkeit): 'Der Azubi kann eine Maschine fachgerecht bedienen.'"},
{id:"k18",hf:3,thema:"Lernziel-Hierarchie",frage:"Was ist der Unterschied zwischen Richtlernziel, Groblernziel und Feinlernziel?",antwort:"Richtlernziel: Übergeordnetes Ziel aus der Ausbildungsordnung (z. B. 'Qualitätssicherung').\nGroblernziel: Konkretisierter Komplex (z. B. 'Prüfverfahren anwenden').\nFeinlernziel: Konkret messbar und überprüfbar (z. B. 'Azubi kann Messschieber auf 0,05 mm genau ablesen')."},
{id:"k19",hf:3,thema:"Vier-Stufen-Methode",frage:"Beschreiben Sie die 4 Stufen der Vier-Stufen-Methode der Unterweisung.",antwort:"1. Vorbereiten: Azubi vorbereiten, Lernziel erklären, Vorwissen aktivieren.\n2. Vormachen: Ausbilder zeigt und erklärt jeden Arbeitsschritt.\n3. Nachmachen: Azubi führt aus und erklärt dabei laut.\n4. Üben: Azubi arbeitet selbstständig, Ausbilder kontrolliert und gibt Feedback."},
{id:"k20",hf:3,thema:"Lerntypen",frage:"Nennen Sie die 4 Lerntypen und ihre bevorzugten Lernkanäle.",antwort:"1. Visuell: Lernt durch Sehen – Schaubilder, Diagramme, Markierungen.\n2. Auditiv: Lernt durch Hören – Erklärungen, Podcasts, lautes Lesen.\n3. Haptisch/kinästhetisch: Lernt durch Tun – Learning by Doing, Bewegung.\n4. Kommunikativ: Lernt durch Austausch – Gruppenarbeit, Diskussionen."},
{id:"k21",hf:3,thema:"Ausbildungsmethoden",frage:"Was unterscheidet ausbilderzentrierte von handlungsorientierten Methoden? Je 2 Beispiele.",antwort:"Ausbilderzentriert (Ausbilder gibt Wissen weiter):\n- Unterweisung (4-Stufen-Methode)\n- Lehrgespräch/Vortrag\n\nHandlungsorientiert (Azubi handelt selbstständig):\n- Leittextmethode\n- Projektmethode\n- Rollenspiel\n- Fallstudie"},
{id:"k22",hf:3,thema:"Leittextmethode",frage:"Wie funktioniert die Leittextmethode? Nennen Sie die 6 Phasen.",antwort:"Azubi bearbeitet Aufgabe selbstständig anhand eines strukturierten Leittexts.\n1. Informieren (Leittext lesen)\n2. Planen (Arbeitsschritte planen)\n3. Entscheiden (Vorgehensweise absprechen mit Ausbilder)\n4. Ausführen\n5. Kontrollieren (Ergebnis prüfen)\n6. Auswerten (Reflexionsgespräch)"},
{id:"k23",hf:3,thema:"Motivation",frage:"Was unterscheidet intrinsische von extrinsischer Motivation?",antwort:"Intrinsisch: Motivation kommt aus dem Azubi selbst (Interesse, Freude, Sinnhaftigkeit). Nachhaltiger.\nExtrinsisch: Motivation von außen (Lob, Gehalt, Druck). Kurzfristig wirksam.\nAusbilder sollten intrinsische Motivation fördern: klare Lernziele, Erfolgserlebnisse, Eigenverantwortung."},
{id:"k24",hf:3,thema:"WWW-Feedback-Methode",frage:"Wie funktioniert die WWW-Methode für Feedback?",antwort:"W – Wahrnehmung: Was habe ich konkret beobachtet? (Fakten, kein Urteil)\nW – Wirkung: Wie hat es auf mich gewirkt?\nW – Wunsch: Was wünsche ich mir für die Zukunft?\n\nBeispiel: 'Du bist um 14:15 erschienen (W). Das hat mich beschäftigt (W). Ich wünsche mir Pünktlichkeit (W).'"},
{id:"k25",hf:3,thema:"Beurteilung",frage:"Was ist der Unterschied zwischen Reflexions- und Beurteilungsgespräch?",antwort:"Reflexionsgespräch: Azubi bewertet sich selbst; Ausbilder begleitet. Fördert intrinsische Motivation und Selbstreflexion.\nBeurteilungsgespräch: Ausbilder bewertet und gibt Noten. Zielt auf extrinsische Motivation ab. Betriebsrat muss Bewertungsgrundsätzen zustimmen (§ 94 BetrVG)."},
{id:"k26",hf:3,thema:"Onboarding",frage:"Nennen Sie die 3 Phasen des Onboarding-Prozesses.",antwort:"1. Vorbereitungsphase: Arbeitsplatz vorbereiten, Infos bereitstellen, Willkommenspaket.\n2. Orientierungsphase: Betrieb und Team kennenlernen, Abläufe verstehen, Patenmodell.\n3. Integrationsphase: Vollständige Eingliederung in Betrieb und Team.\nZiel: Bindung an den Betrieb, Ausbildungsabbrüche verhindern."},
{id:"k27",hf:3,thema:"Lernschwierigkeiten",frage:"Wie geht ein Ausbilder konstruktiv mit Lernschwierigkeiten um?",antwort:"1. Ursachen klären (privat, gesundheitlich, fachlich?)\n2. Individuelle Förderung und Lernberatung anbieten\n3. Ausbildungsinhalt kleinschrittiger aufteilen\n4. Außerbetriebliche Unterstützung (Assistierte Ausbildung § 75 SGB III)\n5. Regelmäßiges Feedback und gezielte Erfolgserlebnisse schaffen"},
{id:"k28",hf:3,thema:"Konfliktmanagement",frage:"Nennen Sie 3 Konfliktursachen in der Ausbildung und 3 konstruktive Lösungsansätze.",antwort:"Ursachen: Unklare Erwartungen, mangelnde Kommunikation, ausbildungsfremde Tätigkeiten.\nLösungen:\n1. Offenes sachliches Gespräch suchen\n2. Mediatoren einschalten (BR, JAV, Ausbildungsberater der Kammer)\n3. Vorfälle schriftlich dokumentieren (wichtig für ggf. Abmahnung)"},
{id:"k29",hf:4,thema:"Prüfungsarten",frage:"Was ist der Unterschied zwischen klassischer und gestreckter Abschlussprüfung?",antwort:"Klassisch (§ 43 BBiG): Eine Prüfung am Ende der Ausbildung.\nGestreckt (§ 44 BBiG): Zwei Teile – Teil 1 ca. zur Hälfte der Ausbildungszeit, Teil 2 am Ende. Beide Teile fließen in die Gesamtnote ein."},
{id:"k30",hf:4,thema:"Zeugnis-Arten",frage:"Was unterscheidet einfaches von qualifiziertem Ausbildungszeugnis?",antwort:"Einfaches Zeugnis: Art der Ausbildung, Dauer, Berufsbezeichnung.\nQualifiziertes Zeugnis (auf Wunsch des Azubis oder Pflicht bei betriebsseitiger Kündigung):\nZusätzlich: Leistungsbeurteilung, Verhalten, Prüfungsvermerk, Beendigungsgrund."},
{id:"k31",hf:4,thema:"Weiterbildungswege",frage:"Nennen Sie 4 Weiterbildungsmöglichkeiten nach der Ausbildung.",antwort:"1. Meister / Fachwirt (berufliche Aufstiegsfortbildung)\n2. Umschulung (anderer Beruf, §§ 58–59 BBiG)\n3. Studium (duales Studium oder reguläres Hochschulstudium)\n4. Begabtenförderung: Weiterbildungsstipendium oder Aufstiegsstipendium des BMBF"},
{id:"k32",hf:4,thema:"Übernahme",frage:"Was müssen Betrieb und Ausbilder bei der Übernahme des Azubis beachten?",antwort:"§ 24 BBiG: Automatisch unbefristetes Arbeitsverhältnis bei Weiterbeschäftigung ohne Vertrag.\n§ 78a BetrVG: JAV-Mitglieder müssen übernommen werden.\n§ 99 BetrVG: Betriebsrat muss zustimmen.\nResturlaub bleibt erhalten (BUrlG).\nSofortiger Kündigungsschutz durch bisherige Betriebszugehörigkeit."}
],

pruefung:[
{id:"p1",hf:1,frage:"Das zentrale Ziel der Berufsausbildung nach § 1 BBiG ist:",optionen:["Das Bestehen der Abschlussprüfung","Der Erwerb beruflicher Handlungsfähigkeit","Die Sicherung des Fachkräftenachwuchses","Das Erlangen eines Schulabschlusszeugnisses"],richtig:1},
{id:"p2",hf:1,frage:"In welchem Paragraphen des BBiG ist die staatliche Anerkennung von Ausbildungsberufen geregelt?",optionen:["§ 5 BBiG","§ 4 BBiG","§ 9 BBiG","§ 1 BBiG"],richtig:1},
{id:"p3",hf:1,frage:"Ein Ausbildungsvertrag sieht 400 € Vergütung vor. Der allgemeinverbindliche Tarifvertrag sieht 550 €, das BBiG 620 € Mindestvergütung vor. Was erhält der Azubi?",optionen:["400 € (Vertrag gilt)","550 € (Tarifvertrag gilt)","620 € (Gesetz gilt immer)","Den höchsten Betrag: 620 € (Günstigkeitsprinzip)"],richtig:3},
{id:"p4",hf:1,frage:"Wann gilt ein Ausbilder als persönlich ungeeignet nach § 29 BBiG?",optionen:["Wenn er keine AEVO-Prüfung abgelegt hat","Wenn er keine fachliche Berufserfahrung besitzt","Wenn er wegen Vergehen gegen Jugendliche verurteilt wurde","Wenn er keine pädagogische Ausbildung hat"],richtig:2},
{id:"p5",hf:1,frage:"Wie wird die fachliche Eignung des Ausbilders nach § 30 BBiG nachgewiesen?",optionen:["Nur durch die AEVO-Prüfung","Berufsabschluss und Berufspraxis allein genügen","Durch Berufsabschluss, Berufspraxis UND AEVO-Prüfung","Durch ein Hochschulstudium"],richtig:2},
{id:"p6",hf:1,frage:"Das Günstigkeitsprinzip besagt:",optionen:["Vorrangige Rechtsquellen sind immer günstiger","Bei mehreren Regelungen zum selben Thema gilt stets die für den Arbeitnehmer günstigste","Der Ausbildende bestimmt welche Regelung gilt","Tarifverträge sind immer günstiger als Gesetze"],richtig:1},
{id:"p7",hf:1,frage:"Ab wie vielen Arbeitnehmern kann ein Betriebsrat gegründet werden (§ 1 BetrVG)?",optionen:["Ab 3 AN","Ab 5 AN","Ab 10 AN","Ab 20 AN"],richtig:1},
{id:"p8",hf:1,frage:"Was enthält eine Ausbildungsordnung nach § 5 BBiG NICHT zwingend?",optionen:["Ausbildungsberufsbild","Prüfungsanforderungen","Ausbildungsvergütung","Ausbildungsrahmenplan"],richtig:2},
{id:"p9",hf:1,frage:"Wie viele Stunden dürfen jugendliche Azubis täglich maximal arbeiten (§ 8 JArbSchG)?",optionen:["6 Stunden","7 Stunden","8 Stunden","10 Stunden"],richtig:2},
{id:"p10",hf:1,frage:"Welchen Mindesturlaub haben Azubis unter 16 Jahren (§ 19 JArbSchG)?",optionen:["20 Werktage","25 Werktage","27 Werktage","30 Werktage"],richtig:3},
{id:"p11",hf:1,frage:"Was ist eine 'betriebliche Übung'?",optionen:["Eine regelmäßige Pflichtunterweisung","Ein gleichförmiges wiederholtes Arbeitgeberverhalten, das Ansprüche begründet","Eine gesetzlich vorgeschriebene Betriebsversammlung","Ein Pflichtpraktikum für Azubis"],richtig:1},
{id:"p12",hf:1,frage:"Was ist die Aufgabe des Ausbildungsberaters der Kammer (§ 76 BBiG)?",optionen:["Prüfungen abnehmen","Ausbildungsverträge eintragen","Ausbildung überwachen und beraten","Ausbildungsordnungen erlassen"],richtig:2},
{id:"p13",hf:1,frage:"Welcher Paragraph verpflichtet zur Erstellung eines betrieblichen Ausbildungsplans?",optionen:["§ 11 BBiG","§ 14 BBiG","§ 17 BBiG","§ 5 BBiG"],richtig:1},
{id:"p14",hf:2,frage:"Die Zeitrichtwertmethode wird überwiegend eingesetzt in:",optionen:["Kaufmännisch-verwaltenden Berufen","Gewerblich-technischen Berufen","Sozialen Berufen","Medizinischen Berufen"],richtig:1},
{id:"p15",hf:2,frage:"Wie lange muss die Probezeit mindestens dauern (§ 20 BBiG)?",optionen:["2 Wochen","1 Monat","2 Monate","3 Monate"],richtig:1},
{id:"p16",hf:2,frage:"Wie lange darf die Probezeit maximal dauern (§ 20 BBiG)?",optionen:["2 Monate","3 Monate","4 Monate","6 Monate"],richtig:2},
{id:"p17",hf:2,frage:"Welche Vereinbarung im Ausbildungsvertrag ist nach § 12 BBiG NICHT nichtig?",optionen:["Ausbildungsgebühr (Azubi zahlt dem Betrieb)","Vertragsstrafe bei vorzeitiger Kündigung","Vereinbarung eines freiwilligen Weihnachtsgeldes","Bindung an Arbeitsvertrag 8 Monate vor Ausbildungsende"],richtig:2},
{id:"p18",hf:2,frage:"Wie viel Prozent der Ausbildungszeit darf ein Auslandsaufenthalt maximal betragen (§ 2 BBiG)?",optionen:["Ein Drittel","Ein Viertel","Die Hälfte","Maximal 6 Monate unabhängig der Ausbildungszeit"],richtig:1},
{id:"p19",hf:2,frage:"Wann MUSS eine JAV gewählt werden (§ 60 BetrVG)?",optionen:["In jedem Betrieb ab 5 AN automatisch","Wenn ein BR besteht und mind. 5 jugendliche AN/Azubis beschäftigt sind","In jedem Ausbildungsbetrieb","Nur auf Antrag der Azubis"],richtig:1},
{id:"p20",hf:2,frage:"Welche Frist hat der Betriebsrat zur Stellungnahme bei der Einstellung eines Azubis (§ 99 BetrVG)?",optionen:["3 Tage","5 Tage","1 Woche","2 Wochen"],richtig:2},
{id:"p21",hf:2,frage:"Was passiert, wenn ein minderjähriger Azubi keine Bescheinigung über die Erstuntersuchung vorlegt?",optionen:["Er muss eine Geldstrafe zahlen","Es gilt ein gesetzliches Beschäftigungsverbot","Der Ausbildungsvertrag wird automatisch nichtig","Die Ausbildung beginnt trotzdem mit Auflagen"],richtig:1},
{id:"p22",hf:2,frage:"Mindestens wie viel Prozent der Ausbildungsvergütung muss bar ausgezahlt werden, wenn Sachleistungen angerechnet werden?",optionen:["10 %","15 %","25 %","50 %"],richtig:2},
{id:"p23",hf:2,frage:"Was ist eine Lerninsel?",optionen:["Ein Beobachtungsplatz nahe den Fachkräften ohne eigenen Arbeitsplatz","Ein identischer Arbeitsplatz wie Fachkraft, ohne Zeitdruck, Arbeit wird vor Einsatz kontrolliert","Ein eigenverantwortliches Übungsunternehmen der Azubis","Ein Schulungsraum außerhalb des Betriebs"],richtig:1},
{id:"p24",hf:2,frage:"Welche Kündigungsfrist gilt für den Azubi bei ordentlicher Kündigung wegen Berufswechsel?",optionen:["1 Woche","2 Wochen","4 Wochen","3 Monate"],richtig:2},

// ══ MODUL 3: APP-LOGIK ══
const state = {
  screen:'start', modus:'gesetze', hf:0,
  queue:[], idx:0, flipped:false,
  mcAnswered:false, mcSelected:null,
  stats:{r:0,f:0,g:0},
  fp:{}
};

const HF_COLOR = {1:'#0C447C',2:'#085041',3:'#633806',4:'#72243E'};
const HF_BG    = {1:'#E6F1FB',2:'#E1F5EE',3:'#FAEEDA',4:'#FBEAF0'};
const HF_LABEL = {0:'Alle HF',1:'HF1',2:'HF2',3:'HF3',4:'HF4'};

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildQueue(){
  let pool=AEVO_DATA[state.modus]||[];
  if(state.hf>0) pool=pool.filter(c=>c.hf===state.hf);
  const f=pool.filter(c=>state.fp[c.id]==='falsch');
  const o=pool.filter(c=>!state.fp[c.id]);
  const r=pool.filter(c=>state.fp[c.id]==='richtig');
  return [...shuffle(f),...shuffle(o),...shuffle(r)];
}

function calcProgress(modus,hf){
  let pool=AEVO_DATA[modus]||[];
  if(hf>0) pool=pool.filter(c=>c.hf===hf);
  const total=pool.length;
  const richtig=pool.filter(c=>state.fp[c.id]==='richtig').length;
  return{total,richtig,pct:total>0?Math.round(richtig/total*100):0};
}

// ══ MODUL 4: RENDERER ══
const app=document.getElementById('app');
const navSub=document.getElementById('nav-sub');

function render(){
  if(state.screen==='start') renderStart();
  else if(state.screen==='done') renderDone();
  else if(state.modus==='pruefung') renderMC();
  else renderKarte();
}

function renderStart(){
  navSub.textContent='Kurshandbuch AEVO Akademie';
  const counts={
    g:AEVO_DATA.gesetze.length,
    k:AEVO_DATA.konzepte.length,
    p:AEVO_DATA.pruefung.length
  };
  const pg=calcProgress('gesetze',0);
  const pk=calcProgress('konzepte',0);
  const pp=calcProgress('pruefung',0);

  app.innerHTML=`
  <div class="start-wrap">
    <div class="start-header">Hallo Kubilay! 👋</div>
    <div class="start-sub">Wähle deinen Lernmodus</div>

    <div class="start-card" onclick="startModus('gesetze')">
      <div class="start-card-icon">⚖️</div>
      <div class="start-card-title">Gesetze & Paragraphen</div>
      <div class="start-card-sub">Alle relevanten Gesetze nach HF – mit Paragraph, Inhalt und Eselsbrücke.</div>
      <div class="start-card-count" style="color:var(--hf2)">${counts.g} Karten · ${pg.pct}% gelernt</div>
    </div>

    <div class="start-card" onclick="startModus('konzepte')">
      <div class="start-card-icon">🧠</div>
      <div class="start-card-title">Konzepte & Methoden</div>
      <div class="start-card-sub">Lernziele, Unterweisungsmethoden, Pädagogik, Onboarding, Konflikt, Beurteilung.</div>
      <div class="start-card-count" style="color:var(--hf3)">${counts.k} Karten · ${pk.pct}% gelernt</div>
    </div>

    <div class="start-card" onclick="startModus('pruefung')">
      <div class="start-card-icon">📝</div>
      <div class="start-card-title">AEVO-Prüfungsfragen</div>
      <div class="start-card-sub">Multiple-Choice im Original-Prüfungsstil. Vorbereitung auf die schriftliche Prüfung.</div>
      <div class="start-card-count" style="color:var(--hf4)">${counts.p} Fragen · ${pp.pct}% richtig</div>
    </div>

    ${renderStatsBlock()}
    ${renderSyncBlock()}
  </div>`;
}

function renderStatsBlock(){
  const modi=[['gesetze','⚖️','Gesetze'],['konzepte','🧠','Konzepte'],['pruefung','📝','Prüfung']];
  let rows='';
  for(const [m,icon,lbl] of modi){
    const hfs=[1,2,3,4];
    let bars='';
    for(const h of hfs){
      const p=calcProgress(m,h);
      if(p.total===0) continue;
      bars+=`<div class="hf-stat-row">
        <div class="hf-stat-name">${icon} ${lbl} · HF${h}</div>
        <div class="hf-stat-bar"><div class="hf-stat-fill" style="width:${p.pct}%;background:${HF_COLOR[h]}"></div></div>
        <div class="hf-stat-pct">${p.richtig} / ${p.total} · ${p.pct}%</div>
      </div>`;
    }
    rows+=bars;
  }
  if(!rows) return '';
  return `<div class="stats-section"><div class="stats-title">Dein Fortschritt</div>${rows}</div>`;
}

function startModus(m){
  state.modus=m; state.screen='lernen'; state.idx=0; state.flipped=false;
  state.mcAnswered=false; state.mcSelected=null;
  state.stats={r:0,f:0,g:0};
  state.queue=buildQueue();
  render();
}

function renderKarte(){
  const card=state.queue[state.idx];
  if(!card){renderDone();return;}
  const prog=calcProgress(state.modus,state.hf);
  const sessionTotal=state.stats.r+state.stats.f;
  navSub.textContent=`${state.modus==='gesetze'?'Gesetze':'Konzepte'} · ${state.idx+1}/${state.queue.length}`;

  const hfBg=HF_BG[card.hf]||'#F1EFE8';
  const hfC=HF_COLOR[card.hf]||'#444';

  app.innerHTML=`
  <div class="tab-bar">
    <button class="tab-btn ${state.modus==='gesetze'?'active':''}" onclick="switchModus('gesetze')">⚖️ Gesetze</button>
    <button class="tab-btn ${state.modus==='konzepte'?'active':''}" onclick="switchModus('konzepte')">🧠 Konzepte</button>
    <button class="tab-btn" onclick="switchModus('pruefung')">📝 Prüfung</button>
    <button class="tab-btn" onclick="state.screen='start';render()">🏠</button>
  </div>
  <div class="hf-filter">
    ${[0,1,2,3,4].map(h=>`<button class="hf-chip ${state.hf===h?'a'+h:''}" onclick="setHF(${h})">${h===0?'Alle':HF_LABEL[h]}</button>`).join('')}
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span>${prog.richtig}/${prog.total} gelernt</span>
      <span>Sitzung: ✅${state.stats.r} ❌${state.stats.f}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
  </div>
  <div class="card-scene">
    <div class="card-wrap ${state.flipped?'flipped':''}" id="cardwrap" onclick="flipCard()">
      <div class="card-face card-front">
        <div>
          <span class="card-hf-badge" style="background:${hfBg};color:${hfC}">HF${card.hf} · ${['','Planen','Vorbereiten','Durchführen','Abschließen'][card.hf]}</span>
          ${card.gesetz?`<div class="card-gesetz">${card.gesetz}</div>`:''}
          ${card.thema?`<div class="card-gesetz">${card.thema}</div>`:''}
          <div class="card-frage">${card.frage}</div>
        </div>
        <div class="card-tap-hint">Tippen zum Umdrehen ↓</div>
      </div>
      <div class="card-face card-back">
        <div>
          <div class="card-label">Antwort</div>
          <div class="card-antwort">${card.antwort}</div>
        </div>
      </div>
    </div>
  </div>
  ${state.flipped?`
  <div class="rate-wrap">
    <button class="rate-btn nein" onclick="bewerten('falsch')">❌ Nochmal</button>
    <button class="rate-btn ja" onclick="bewerten('richtig')">✅ Gewusst</button>
  </div>`:'<div style="height:56px"></div>'}`;
}

function renderMC(){
  const card=state.queue[state.idx];
  if(!card){renderDone();return;}
  navSub.textContent=`Prüfung · ${state.idx+1}/${state.queue.length}`;
  const hfBg=HF_BG[card.hf]||'#F1EFE8';
  const hfC=HF_COLOR[card.hf]||'#444';

  let optHtml=card.optionen.map((o,i)=>{
    let cls='';
    if(state.mcAnswered){
      if(i===card.richtig) cls='richtig';
      else if(i===state.mcSelected) cls='falsch';
      else cls='neutral';
    }
    return `<button class="mc-option ${cls}" ${state.mcAnswered?'disabled':''} onclick="mcAnswer(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
  }).join('');

  const resultHtml=state.mcAnswered?`
    <div class="mc-result ${state.mcSelected===card.richtig?'ok':'ko'} show">
      ${state.mcSelected===card.richtig?'✅ Richtig!':'❌ Die richtige Antwort: '+String.fromCharCode(65+card.richtig)+') '+card.optionen[card.richtig]}
    </div>
    <button class="mc-next" onclick="naechste()">Nächste Frage →</button>`:'';

  app.innerHTML=`
  <div class="tab-bar">
    <button class="tab-btn" onclick="switchModus('gesetze')">⚖️ Gesetze</button>
    <button class="tab-btn" onclick="switchModus('konzepte')">🧠 Konzepte</button>
    <button class="tab-btn active">📝 Prüfung</button>
    <button class="tab-btn" onclick="state.screen='start';render()">🏠</button>
  </div>
  <div class="hf-filter">
    ${[0,1,2,3,4].map(h=>`<button class="hf-chip ${state.hf===h?'a'+h:''}" onclick="setHF(${h})">${h===0?'Alle':HF_LABEL[h]}</button>`).join('')}
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span>Frage ${state.idx+1} von ${state.queue.length}</span>
      <span>✅${state.stats.r} ❌${state.stats.f}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(state.idx/state.queue.length*100)}%"></div></div>
  </div>
  <div class="mc-card">
    <span class="mc-hf" style="background:${hfBg};color:${hfC}">HF${card.hf}</span>
    <div class="mc-frage">${card.frage}</div>
    ${optHtml}
    ${resultHtml}
  </div>`;
}

function renderDone(){
  const{r,f,g}=state.stats;
  const pct=g>0?Math.round(r/g*100):0;
  const emoji=pct>=80?'🎉':pct>=60?'💪':'📖';
  navSub.textContent='Runde abgeschlossen';
  app.innerHTML=`
  <div class="done-wrap">
    <div class="done-emoji">${emoji}</div>
    <div class="done-title">${pct>=80?'Sehr gut!':pct>=60?'Gute Arbeit!':'Weiter üben!'}</div>
    <div class="done-sub">
      ${g} Fragen bearbeitet<br>
      ✅ ${r} richtig · ❌ ${f} falsch · ${pct}%
    </div>
    <button class="done-btn" onclick="wiederholen()">🔁 Falsche nochmal üben</button>
    <button class="done-btn" onclick="startModus(state.modus)">🔀 Neu mischen & starten</button>
    <button class="done-btn sec" onclick="state.screen='start';render()">🏠 Zurück zum Start</button>
  </div>`;
}

// ══ AKTIONEN ══
function flipCard(){ state.flipped=!state.flipped; render(); }

function bewerten(e){
  const card=state.queue[state.idx];
  state.fp[card.id]=e;
  if(e==='richtig') state.stats.r++; else state.stats.f++;
  state.stats.g++;
  state.idx++; state.flipped=false;
  if(state.idx>=state.queue.length) state.screen='done';
  render();
}

function mcAnswer(i){
  if(state.mcAnswered) return;
  state.mcSelected=i; state.mcAnswered=true;
  const card=state.queue[state.idx];
  const ok=i===card.richtig;
  state.fp[card.id]=ok?'richtig':'falsch';
  if(ok) state.stats.r++; else state.stats.f++;
  state.stats.g++;
  render();
}

function naechste(){
  state.idx++; state.mcAnswered=false; state.mcSelected=null;
  if(state.idx>=state.queue.length) state.screen='done';
  render();
}

function switchModus(m){
  state.modus=m; state.idx=0; state.flipped=false;
  state.mcAnswered=false; state.mcSelected=null;
  state.stats={r:0,f:0,g:0};
  state.screen='lernen';
  state.queue=buildQueue();
  render();
}

function setHF(h){
  state.hf=h; state.idx=0; state.flipped=false;
  state.mcAnswered=false; state.mcSelected=null;
  state.stats={r:0,f:0,g:0};
  state.queue=buildQueue();
  render();
}

function wiederholen(){
  const falsche=AEVO_DATA[state.modus].filter(c=>state.fp[c.id]==='falsch');
  if(!falsche.length){startModus(state.modus);return;}
  state.queue=shuffle(falsche);
  state.idx=0; state.flipped=false; state.mcAnswered=false; state.mcSelected=null;
  state.stats={r:0,f:0,g:0}; state.screen='lernen';
  render();
}

// ══ MODUL 5: PERSISTENZ (localStorage + Export/Import) ══

const LS_KEY = 'aevo_fp_v1';

function loadFP() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { const p = JSON.parse(raw); if(p && typeof p==='object') state.fp = p; }
  } catch(e) {}
}

function saveFP() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state.fp)); } catch(e) {}
}

const _bewerten = bewerten;
function bewerten(e) {
  const card = state.queue[state.idx];
  state.fp[card.id] = e;
  if(e==='richtig') state.stats.r++; else state.stats.f++;
  state.stats.g++;
  saveFP();
  state.idx++; state.flipped = false;
  if(state.idx >= state.queue.length) state.screen = 'done';
  render();
}

const _mcAnswer = mcAnswer;
function mcAnswer(i) {
  if(state.mcAnswered) return;
  state.mcSelected = i; state.mcAnswered = true;
  const card = state.queue[state.idx];
  const ok = i === card.richtig;
  state.fp[card.id] = ok ? 'richtig' : 'falsch';
  if(ok) state.stats.r++; else state.stats.f++;
  state.stats.g++;
  saveFP();
  render();
}

function exportFP() {
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(state.fp))));
  const ta = document.getElementById('sync-out');
  if(ta) {
    ta.value = code;
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    showMsg('sync-msg-out', 'ok', '✅ Code kopiert! Füge ihn in iCloud-Notizen ein.');
  }
}

function importFP() {
  const ta = document.getElementById('sync-in');
  if(!ta || !ta.value.trim()) return;
  try {
    const parsed = JSON.parse(decodeURIComponent(escape(atob(ta.value.trim()))));
    if(parsed && typeof parsed === 'object') {
      state.fp = parsed;
      saveFP();
      showMsg('sync-msg-in', 'ok', '✅ Fortschritt geladen! Kehre zum Start zurück...');
      setTimeout(()=>{ state.screen='start'; render(); }, 1800);
    }
  } catch(e) {
    showMsg('sync-msg-in', 'ko', '❌ Ungültiger Code. Vollständig einfügen und nochmal versuchen.');
  }
}

function showMsg(id, cls, txt) {
  const el = document.getElementById(id);
  if(el) { el.className = 'sync-msg ' + cls; el.textContent = txt; }
}

function resetAlles() {
  if(!confirm('Wirklich allen Fortschritt löschen?')) return;
  state.fp = {}; saveFP(); state.screen='start'; render();
}

function renderSyncBlock() {
  const total = Object.keys(state.fp).length;
  const richtig = Object.values(state.fp).filter(v=>v==='richtig').length;
  return `
  <div class="sync-wrap">
    <div class="sync-title">📲 Geräte synchronisieren</div>
    <div class="sync-sub">Exportiere deinen Fortschritt als Code und füge ihn auf einem anderen Gerät ein – z. B. per iCloud-Notizen oder WhatsApp an dich selbst.</div>
    <div class="sync-sub" style="font-weight:500;color:#1c1c1e;margin-bottom:10px;">Aktuell: ${richtig} von ${total} Karten bewertet</div>
    <button class="sync-btn export" onclick="exportFP()">📤 Fortschritt exportieren & kopieren</button>
    <textarea class="sync-code" id="sync-out" readonly placeholder="Code erscheint hier nach Export..."></textarea>
    <div class="sync-msg" id="sync-msg-out"></div>
    <div style="margin-top:12px;border-top:0.5px solid var(--border);padding-top:12px;">
      <div class="sync-sub" style="margin-bottom:6px;">Code von anderem Gerät einlesen:</div>
      <textarea class="sync-code" id="sync-in" placeholder="Code hier einfügen..."></textarea>
      <button class="sync-btn import" onclick="importFP()">📥 Fortschritt importieren</button>
      <div class="sync-msg" id="sync-msg-in"></div>
    </div>
    <button class="sync-btn reset" style="margin-top:10px" onclick="resetAlles()">🗑 Alles zurücksetzen</button>
  </div>`;
}

// Beim Start Fortschritt aus localStorage laden, dann rendern
loadFP();
render();
</script>
